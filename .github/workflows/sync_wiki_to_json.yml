name: Sync Wiki to Glossary JSON

on:
  gollum

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Checkout Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki_repo

      - name: Parse Wiki to JSON
        shell: python
        run: |
          import re
          import json
          import os

          wiki_path = 'wiki_repo/在线术语库.md'
          output_path = 'main_repo/glossaries/glossary-index.json'

          if not os.path.exists(wiki_path):
              print(f"Error: {wiki_path} not found.")
              exit(0)

          def is_chinese(s):
              # 判断字符串中是否包含中文字符
              return any('\u4e00' <= char <= '\u9fff' for char in s)

          def process_name(raw_name):
              # 1. 移除结尾的 "术语表"
              raw_name = re.sub(r'\s*术语表\s*$', '', raw_name.strip())
              
              # 2. 按照显式分隔符 (| 丨 /) 初步拆分
              initial_parts = [p.strip() for p in re.split(r'[|丨/]', raw_name) if p.strip()]
              
              all_fragments = []
              for part in initial_parts:
                  # 3. 智能拆分语言块：
                  # 逻辑：仅在 [英文/数字] 与 [中文] 之间的空格处拆分
                  # 这样可以保留 "宝可梦（小智）" 这种内部包含括号和中文的结构
                  # 拆分点 A: 后面跟着中文的空格 -> \s+(?=[\u4e00-\u9fff])
                  # 拆分点 B: 前面是中文的空格 -> (?<=[\u4e00-\u9fff])\s+
                  sub_fragments = re.split(r'\s+(?=[\u4e00-\u9fff])|(?<=[\u4e00-\u9fff])\s+', part)
                  all_fragments.extend([f.strip() for f in sub_fragments if f.strip()])

              if not all_fragments:
                  return raw_name, []

              # 4. 确定主名称 (Name)：优先选择包含中文的第一个片段
              main_name = None
              for f in all_fragments:
                  if is_chinese(f):
                      main_name = f
                      break
              
              # 如果全都没中文，取第一个片段
              if not main_name:
                  main_name = all_fragments[0]

              # 5. 确定标签 (Tags)：除了主名称以外的所有片段
              tags = [f for f in all_fragments if f != main_name]
              
              return main_name, tags

          with open(wiki_path, 'r', encoding='utf-8') as f:
              content = f.read()

          sections = re.split(r'\n(?=### )', content)
          results = []

          for section in sections:
              if not section.strip().startswith('###'):
                  continue
              
              name_match = re.search(r'###\s+(.*)', section)
              url_match = re.search(r'\*\s+链接：(?:\[.*?\]\()?(https?://[^\s\)]+)\)?', section)
              maint_match = re.search(r'\*\s+维护者：\[(.*?)\]\((.*?)\)', section)

              if name_match and url_match and maint_match:
                  raw_name = name_match.group(1).strip()
                  main_name, tags = process_name(raw_name)
                  
                  url = url_match.group(1).strip()
                  maintainer = maint_match.group(1).strip()
                  feedback = maint_match.group(2).strip()

                  if feedback.startswith('mailto:'):
                      feedback = feedback.replace('mailto:', '')

                  results.append({
                      "name": main_name,
                      "tags": tags,
                      "url": url,
                      "maintainer": maintainer,
                      "visibility": True,
                      "feedback": feedback
                  })

          os.makedirs(os.path.dirname(output_path), exist_ok=True)
          with open(output_path, 'w', encoding='utf-8') as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          
          print(f"Processed {len(results)} items.")

      - name: Commit and Push
        run: |
          cd main_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add glossaries/glossary-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update glossary-index.json (fixed name splitting)"
            git push origin main
          fi
